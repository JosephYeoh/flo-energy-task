apiVersion: batch/v1
kind: Job
metadata:
  name: nem12-processor-job
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: nem12-processor
          image: nem12-meter-readings:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: INPUT_PATH
              value: /data/in/input.csv
            - name: OUTPUT_PATH
              value: /data/out/output.sql
            - name: BATCH_SIZE
              value: "1000"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nem12-data-pvc
